# Skills-X English Language File

# ============================================================================
# General Messages
# ============================================================================
app_name: "Skills-X"
app_desc: "AI Agent Skills Management Tool"
app_long_desc: |
  Skills-X is an AI Agent Skills management tool.
  
  Available commands:
    list          List all available skills from registry
    init          Install skill to local

# ============================================================================
# Command Descriptions
# ============================================================================
cmd_list_short: "List all available skills from registry"
cmd_list_long: |
  List all skills from the registry, grouped by repository source.
  
  By default, it fetches the latest skills from each repository.
  Use --no-fetch to only show skills defined in the registry.
cmd_list_flag_verbose: "Show verbose output"
cmd_list_flag_fetch: "Fetch from repositories to discover all skills (slower)"

cmd_init_short: "Install skill to local"
cmd_init_long: |
  Install specified skill to local directory (default: current directory).
  
  Skills are fetched from the registry and cloned from their source repositories.
  
  Examples:
    skills-x init react-best-practices       Install react-best-practices skill
    skills-x init remotion                   Install remotion skill
    skills-x init --all                      Install all skills
    skills-x init remotion -t ./skills       Install to specified directory
cmd_init_flag_all: "Install all skills"
cmd_init_flag_target: "Target directory (default: current directory)"
cmd_init_flag_force: "Force overwrite existing skills"
cmd_init_flag_refresh: "Force refresh cached repositories (slower, fetches latest)"
cmd_init_flag_include_x: "Include skills-x (self-developed) skills when using --all"

